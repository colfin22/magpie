name: CI
on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # tests/test_pages.py syntax-checks the RENDERED page JS with node, and
      # skips itself when node is missing — so without this the guard against
      # the broken-<script> bug class (v0.12.0) was silently skipping in CI.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install -r requirements.txt pytest
      - run: node --version && python -m pytest -q
