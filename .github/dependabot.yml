version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    ignore:
      # money-moving code: framework majors get deliberate upgrade sessions, not auto-PRs
      - dependency-name: "fastapi"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ccxt"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /
    ignore:
      # CI doesn't build the image — a green tick on a base-image bump is deceptive
      - dependency-name: "python"
